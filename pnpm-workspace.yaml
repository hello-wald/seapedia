packages:
    - "apps/*"
    - "packages/*"
onlyBuiltDependencies:
    - "@prisma/client"
    - "@prisma/engines"
    - esbuild
    - prisma
minimumReleaseAgeExclude:
    - "@react-router/dev@8.0.0"
    - "@react-router/express@8.0.0"
    - "@react-router/node@8.0.0"
    - "@react-router/serve@8.0.0"
    - react-router@8.0.0
allowBuilds:
    "@prisma/client": true
    "@prisma/engines": true
    "@scarf/scarf": true
    esbuild: true
    prisma: true
