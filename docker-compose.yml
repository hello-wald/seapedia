services:
    postgres:
        image: postgres:17-alpine
        container_name: seapedia-db
        restart: unless-stopped
        environment:
            POSTGRES_USER: seapedia
            POSTGRES_PASSWORD: seapedia
            POSTGRES_DB: seapedia
        ports:
            - "5432:5432"
        volumes:
            - seapedia-db-data:/var/lib/postgresql/data
        healthcheck:
            test: ["CMD-SHELL", "pg_isready -U seapedia -d seapedia"]
            interval: 5s
            timeout: 5s
            retries: 5

volumes:
    seapedia-db-data:
